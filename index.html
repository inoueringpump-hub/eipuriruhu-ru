<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>設定</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont;
    background: #f2f2f7;
}

/* ステータスバー */
.status {
    display: flex;
    justify-content: space-between;
    padding: 6px 10px;
    font-size: 14px;
    background: #fff;
}

/* ヘッダー */
.header {
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    padding: 10px;
}

/* セクション */
.section {
    margin-top: 20px;
}

/* 項目 */
.item {
    background: #fff;
    padding: 14px;
    border-bottom: 1px solid #ddd;
    display: flex;
    justify-content: space-between;
}

/* ボタン */
.button {
    color: #007aff;
    cursor: pointer;
}

/* 通知 */
.notification {
    position: fixed;
    top: -120px;
    left: 10px;
    right: 10px;
    background: #fff;
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    transition: 0.5s;
}

/* FaceID */
.face {
    position: fixed;
    top: 30%;
    width: 100%;
    text-align: center;
    font-size: 28px;
    opacity: 0;
}

/* アップデート */
.update {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: black;
    color: white;
    display: none;
    text-align: center;
    padding-top: 40vh;
}

/* ★★★ ここが今回の最重要修正 ★★★ */
.result {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.9);

    width: 80%;
    text-align: center;
    font-size: 26px;

    background: rgba(255,255,255,0.95);
    padding: 30px;
    border-radius: 20px;

    box-shadow: 0 20px 60px rgba(0,0,0,0.3);

    z-index: 9999;
    opacity: 0;
    transition: 0.5s;
}
</style>
</head>

<body>

<div class="status">
    <span id="clock">--:--</span>
    <span>📶 🔋87%</span>
</div>

<div class="header">設定</div>

<div class="section">
    <div class="item">Apple ID <span>井上さん</span></div>
    <div class="item">Wi-Fi <span>接続中</span></div>
    <div class="item">Bluetooth <span>オン</span></div>
    <div class="item">モバイル通信 <span>オン</span></div>
    <div class="item">通知 <span>オン</span></div>
</div>

<div class="section">
    <div class="item">プライバシー <span>保護中</span></div>
    <div class="item">位置情報 <span>許可</span></div>
    <div class="item">セキュリティ <span>最高</span></div>
    <div class="item">AI分析モード <span class="button" id="btn">押すな！</span></div>
    <div class="item">行動ログ <span>記録中</span></div>
</div>

<div class="section">
    <div class="item">バッテリー <span>87%</span></div>
    <div class="item">ストレージ <span>128GB中64GB使用</span></div>
</div>

<div class="notification" id="notif">AI: 外部サーバー接続中...</div>
<div class="face" id="face">🔍 Face ID 認証中...</div>
<div class="update" id="update">iOSアップデート中...<br>0%</div>

<div class="result" id="result"></div>

<script>
let count = 0;
let successRate = 0.05;
let ended = false;

const btn = document.getElementById("btn");
const notif = document.getElementById("notif");
const face = document.getElementById("face");
const result = document.getElementById("result");
const update = document.getElementById("update");

// 時計
function updateClock(){
    const d = new Date();
    document.getElementById("clock").innerText =
        String(d.getHours()).padStart(2,'0') + ":" +
        String(d.getMinutes()).padStart(2,'0');
}
setInterval(updateClock,1000);
updateClock();

// クリック（一本化）
btn.addEventListener("click", handleClick);

function handleClick(e){
    if(ended) return;

    e.preventDefault();
    count++;
    successRate += 0.02;

    result.innerText = "解析中... ("+count+")";

    if(count === 2){
        notif.style.top = "20px";
    }

    if(count === 4){
        face.style.opacity = 1;
    }

    if(count === 6){
        startUpdate();
    }

    if(Math.random() < successRate){
        success();
    }
}

// アップデート
function startUpdate(){
    update.style.display = "block";
    let p = 0;

    const interval = setInterval(()=>{
        p += 10;
        update.innerHTML = "iOSアップデート中...<br>"+p+"%";

        if(p >= 100){
            clearInterval(interval);
            update.style.display = "none";
        }
    },300);
}

// 成功演出（中央表示）
function success(){
    ended = true;

    result.style.opacity = 1;
    result.style.transform = "translate(-50%, -50%) scale(1)";

    setTimeout(()=>{
        result.innerText = "解析完了";
    },800);

    setTimeout(()=>{
        result.innerText = "あなたは今、世界ランキング1位です";
    },2000);

    setTimeout(()=>{
        result.innerText = "おめでとうございます🏆";
    },3500);

    setTimeout(()=>{
        document.body.style.background = "#000";
        document.body.style.color = "#fff";

        result.style.background = "rgba(0,0,0,0.85)";
        result.style.color = "#fff";

        result.innerText = "あなたのデータは収集されました";
    },5000);

    setTimeout(()=>{
        result.innerText = "…ウソです😎";
    },6500);

    setTimeout(()=>{
        result.innerText = "エイプリルフール";
    },7500);
}

// 強制成功
setTimeout(()=>{
    if(!ended) success();
},12000);

// PC救済
document.addEventListener("keydown",(e)=>{
    if(e.key==="Enter") success();
});
</script>

</body>
</html>
